<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certify — Create Certificates</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Certify</h1>
    <p>Create personalized certificates for your students</p>
  </header>

  <main>
    <section class="card">
      <h2>Create Certificates</h2>
      <form id="createForm">
        <div class="row">
          <label for="company">Company / Organization Name</label>
          <input type="text" id="company" name="company" autocomplete="organization" placeholder="X Company" required>
        </div>
        <div class="row">
          <label for="title">Certificate Title (course / program)</label>
          <input type="text" id="title" name="title" autocomplete="off" placeholder="Web Development Bootcamp" required>
        </div>
        <div class="row">
          <span class="label-heading">Template</span>
          <div class="templates" role="radiogroup" aria-label="Certificate template">
            <label class="tpl"><input type="radio" name="template" value="classic" checked>
              <span class="swatch classic"></span> Classic</label>
            <label class="tpl"><input type="radio" name="template" value="modern">
              <span class="swatch modern"></span> Modern</label>
            <label class="tpl"><input type="radio" name="template" value="elegant">
              <span class="swatch elegant"></span> Elegant</label>
          </div>
        </div>
        <div class="row">
          <label for="students">Students (one per line: Name, Course, Date)</label>
          <textarea id="students" name="students" rows="10" autocomplete="off" placeholder="John Doe, Python Basics, 2026-06-30&#10;Jane Smith&#10;Mani, 2026-06-30&#10;Bob Wilson, Java Fundamentals, 2026-06-30" required></textarea>
          <small>Format: <code>Name</code> · <code>Name, Date</code> · <code>Name, Course, Date</code></small>
        </div>
        <button type="submit" id="submitBtn">Generate Certificates</button>
      </form>
    </section>

    <section class="card hidden" id="results">
      <h2>Certificates Created <span id="resultCount" class="badge"></span></h2>
      <p>Share each link with the student. They can view and download their PDF certificate.</p>
      <div class="actions">
        <button type="button" id="copyAll">Copy All Links</button>
        <button type="button" id="downloadCsv">Download CSV</button>
      </div>
      <div class="table-wrap">
        <table id="linksTable">
          <thead>
            <tr><th>Student</th><th>Unique ID</th><th>Link</th><th></th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
